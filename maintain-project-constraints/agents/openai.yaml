interface:
  display_name: "Maintain Project Constraints"
  short_description: "Create and maintain AGENTS.md/CLAUDE.md with business goals, common commands, and project doc index"
  default_prompt: "Use $maintain-project-constraints to read the codebase or existing project docs, extract the project's macro business goals, inventory common development commands, enumerate all standardized docs under docs/features/, docs/architecture/, and docs/principles/, then write or update AGENTS.md and CLAUDE.md. Note the role split: AGENTS.md targets non-Claude agents (Codex) — use agent-neutral language, no platform-specific syntax. CLAUDE.md targets Claude Code — can include Claude-specific features (hooks, scheduled tasks, cowork, MCP). Both share Common Development Commands, Project Business Goals, and Project Documentation Index in that order; CLAUDE.md may add a Claude-specific section after these. Keep both under 100 lines. Extract prohibitions from past issues/commit history."
