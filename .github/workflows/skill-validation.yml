name: Skill Metadata Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-skill-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Validate SKILL.md frontmatter
        run: node dist/bin/apollo-toolkit.js validate-skill-frontmatter

  validate-skill-description-length:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Validate SKILL.md description length
        run: node dist/bin/apollo-toolkit.js validate-skill-frontmatter

  validate-openai-agent-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Validate agents/openai.yaml
        run: node dist/bin/apollo-toolkit.js validate-openai-agent-config
