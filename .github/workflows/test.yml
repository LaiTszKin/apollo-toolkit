name: Test

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Uses bash scripts/test.sh directly (not npm test) for cross-platform
      # compatibility — .sh is not executable on native Windows PowerShell
      # without Git Bash. The parallel skill-validation.yml workflow also
      # uses bash scripts/test.sh for consistency.
      - name: Run tests with coverage
        shell: bash
        run: bash scripts/test.sh
        env:
          COVERAGE: 'true'
