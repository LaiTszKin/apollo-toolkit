interface:
  display_name: "Iterative Code Quality"
  short_description: "Refactor names, functions, modules, logs, and tests in repeated behavior-safe passes"
  default_prompt: "Use $iterative-code-quality to scan this repository, build an evidence-backed quality backlog, then execute full iterations that address naming, function simplification, reusable extraction, module-boundary cleanup, logging alignment, and testing together rather than treating each work type as its own round; solve as many inherited quality problems as the repository can safely support, use tests or other reliable guardrails to justify more aggressive refactors instead of deferring worthwhile cleanup for subjective confidence reasons, preserve intended behavior and the system's top-level runtime architecture, and do not write a completion report while any known in-scope actionable issue remains; only finish after the latest scan is clear or remaining items are explicitly classified as blocked, unsafe, low-value, speculative, or approval-dependent, and the guarded test surface is green; then run $align-project-documents and $maintain-project-constraints to synchronize docs and AGENTS.md."
