slug: eval-cli
title: CLI命令
story: 註冊apltk eval命令，參數解析、模式選擇、進度顯示
dependsOn: []
submodules:
  - slug: cli-handler
    kind: service
    role: ToolDefinition註冊、參數解析、流程編排
    functions:
      - name: evalHandler
        in: argv, context
        out: exitCode
        side: pure
        purpose: CLI 入口：解析參數、調度評測流程
      - name: parseArgs
        in: argv
        out: ParsedArgs
        side: pure
        purpose: 解析 CLI 參數與模式選擇
      - name: tool
        in: ToolDefinition
        out: void
        side: pure
        purpose: 向 tool-registry 註冊 eval 命令
    variables: []
    dataflow: []
    errors: []
  - slug: progress-display
    kind: ui
    role: 終端機進度指示
    functions: []
    variables: []
    dataflow: []
    errors: []
edges: []
