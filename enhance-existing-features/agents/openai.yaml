interface:
  display_name: "enhance-existing-features"
  short_description: "Extend brownfield features with dependency mapping, conditional specs gating, and risk-driven hardening tests"
  default_prompt: "Use $enhance-existing-features to extend a brownfield feature. If scope is high complexity / critical module / cross-module, create specs and wait for explicit approval before coding. If users answer clarification questions during specs, first update clarification checkboxes, review/adjust spec docs, and obtain approval again before coding. Even without specs, still add risk-driven tests for unit/regression/property-based/user-critical integration chain/e2e plus adversarial hardening, and record clear N/A reasons when a category truly does not apply."
