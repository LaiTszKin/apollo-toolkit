interface:
  display_name: "Commit and Push"
  short_description: "Submit local changes with commit and push only"
  default_prompt: "Use $commit-and-push to inspect the current git state, classify the diff, run required dependency skills ($align-project-documents and $maintain-project-constraints, plus $review-change-set, $discover-edge-cases, and $harden-app-security as quality gates for code-affecting changes), resolve any confirmed findings, create a concise Conventional Commit, and push to the current branch without any versioning or release steps."
